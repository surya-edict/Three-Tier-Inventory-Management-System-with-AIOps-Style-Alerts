# 1. Default Deny All in Namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: inventory-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# 2. Allow Frontend to reach Backend ONLY
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-frontend
  namespace: inventory-system
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - protocol: TCP
      port: 8000
---
# 3. Allow Backend to reach RDS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-rds
  namespace: inventory-system
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 10.0.0.0/16 # Allow traffic within VPC for RDS
    ports:
    - protocol: TCP
      port: 5432
