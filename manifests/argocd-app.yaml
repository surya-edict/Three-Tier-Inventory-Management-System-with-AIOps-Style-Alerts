apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: <REPLACE_WITH_YOUR_GITHUB_REPO_URL>
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: inventory-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
