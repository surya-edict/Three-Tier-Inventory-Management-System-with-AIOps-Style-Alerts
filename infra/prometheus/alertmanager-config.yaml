global:
  resolve_timeout: 5m
  # Optional: Slack configuration
  # slack_api_url: '<SLACK_WEBHOOK_URL>'

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default-receiver'
  routes:
  - match:
      severity: critical
    receiver: 'critical-receiver'

receivers:
- name: 'default-receiver'
